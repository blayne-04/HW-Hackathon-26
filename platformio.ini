; PlatformIO Project Configuration File

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; Build only sound.cpp (exclude any main.cpp)
build_src_filter = +<sound.cpp> -<main.cpp> -<ledText.cpp>

lib_deps =
    fastled/FastLED@^3.7.5
    blynkkk/Blynk@^1.1.0
    kosme/arduinoFFT@^1.5.7
    bodmer/TFT_eSPI

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_CS=5 -DTFT_DC=2 -DTFT_RST=4
    -DSPI_FREQUENCY=40000000