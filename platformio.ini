; PlatformIO Project Configuration File

[env:esp32doit-devkit-v1]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_port = COM3
upload_speed = 57600

; Active core application build.
build_src_filter = +<main.cpp>

lib_deps =
    bodmer/TFT_eSPI
    git@github.com:santiago-pelaez/esp-dsp.git#master

build_flags = 
    -I include
    -include include/User_Setup.h
